# Render deployment profile. Activated via SPRING_PROFILES_ACTIVE=render (set in Dockerfile).
#
# Unlike application.properties (gitignored, local-dev-only with real secrets hardcoded),
# this file is committed to git and contains NO secrets — every credential is a required
# ${ENV_VAR} placeholder that Spring resolves from the environment at startup. Set the
# corresponding env vars in the Render dashboard (Environment tab). Missing a required one
# fails startup immediately with a clear "could not resolve placeholder" error, rather than
# silently running with a blank/wrong credential.

spring.application.name=darfin-main

# Render injects $PORT for web services; falls back to 8080 for parity with local dev.
server.port=${PORT:8080}
server.servlet.context-path=/

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# none, not update: this schema is shared with the Python batch pipeline
# (darfin-company-analysis) and report_facts/report_facts-adjacent tables are
# JdbcTemplate-only precisely to keep Hibernate from touching them (see
# CompanyAnalysisService.java's doc comment). Never let a deploy silently migrate
# the shared schema. (Not "validate" either — the live dev DB already has drift
# from the entities, e.g. ai_analysis_item.extra is longtext vs the entity's json,
# masked today by ddl-auto=update; validate would hard-fail startup on that until
# it's fixed. Revisit once schema/entity drift is resolved.)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

kis.real.base-url=https://openapi.koreainvestment.com:9443
kis.mock.base-url=https://openapivts.koreainvestment.com:29443
kis.real.websocket-url=ws://ops.koreainvestment.com:21000

kis.mock.app-key=${KIS_MOCK_APP_KEY}
kis.mock.app-secret=${KIS_MOCK_APP_SECRET}
kis.real.app-key=${KIS_REAL_APP_KEY}
kis.real.app-secret=${KIS_REAL_APP_SECRET}

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=1209600000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

oauth2.kakao.client-id=${KAKAO_CLIENT_ID}
oauth2.kakao.client-secret=${KAKAO_CLIENT_SECRET}
oauth2.kakao.redirect-uri=${KAKAO_REDIRECT_URI}

oauth2.google.client-id=${GOOGLE_CLIENT_ID}
oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET}
oauth2.google.redirect-uri=${GOOGLE_REDIRECT_URI}

dart.api.key=${DART_API_KEY}
dart.api.base-url=https://opendart.fss.or.kr/api

toss.payments.secret-key=${TOSS_SECRET_KEY}
toss.payments.base-url=https://api.tosspayments.com/v1
