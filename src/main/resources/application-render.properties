# Render(프로덕션) 전용 설정 — 실제 값은 전부 Render 대시보드 환경변수로 주입한다.
# 활성화: 환경변수 SPRING_PROFILES_ACTIVE=render (Dockerfile 기본값으로 이미 설정됨)
# 이 파일에는 실제 비밀값을 절대 적지 않는다. 전부 ${ENV_VAR} 참조만 사용.

server.port=${PORT:8080}
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

kis.real.base-url=https://openapi.koreainvestment.com:9443
kis.mock.base-url=https://openapivts.koreainvestment.com:29443
kis.real.websocket-url=ws://ops.koreainvestment.com:21000

kis.mock.app-key=${KIS_MOCK_APP_KEY}
kis.mock.app-secret=${KIS_MOCK_APP_SECRET}
kis.real.app-key=${KIS_REAL_APP_KEY}
kis.real.app-secret=${KIS_REAL_APP_SECRET}

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:1209600000}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

oauth2.kakao.client-id=${KAKAO_CLIENT_ID}
oauth2.kakao.client-secret=${KAKAO_CLIENT_SECRET}
oauth2.kakao.redirect-uri=${KAKAO_REDIRECT_URI}

oauth2.google.client-id=${GOOGLE_CLIENT_ID}
oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET}
oauth2.google.redirect-uri=${GOOGLE_REDIRECT_URI}

dart.api.key=${DART_API_KEY}
dart.api.base-url=https://opendart.fss.or.kr/api

toss.payments.secret-key=${TOSS_SECRET_KEY}
toss.payments.base-url=https://api.tosspayments.com/v1

# darfin-disclosure(FastAPI, 포트 8002) 서비스 URL — Render 배포 후 실제 도메인으로 교체
llm.service.base-url=${LLM_SERVICE_BASE_URL:http://127.0.0.1:8002}

# darfin-investment(FastAPI, 포트 8001) 서비스 URL — Render 배포 후 실제 도메인으로 교체
analysis.service.base-url=${ANALYSIS_SERVICE_BASE_URL:http://127.0.0.1:8001}
